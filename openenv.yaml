name: mlops-pipeline-debugger
version: "1.0.0"
description: "An RL environment where an AI agent debugs broken ML production pipelines by diagnosing data drift, schema changes, and GPU failures."
tags:
  - openenv
  - mlops
  - debugging
  - real-world
  - reinforcement-learning
  - production

tasks:
  - id: schema_drift
    name: "Schema Drift Detection & Fix"
    description: "Detect and fix a schema change that broke the ingestion pipeline"
    difficulty: easy
    max_steps: 8
    scenario: "An upstream API changed the 'Age' feature from int to string. The pipeline crashes on type validation."
    
  - id: concept_drift
    name: "Concept Drift Detection & Retraining"
    description: "Identify concept drift and trigger retraining on recent data"
    difficulty: medium
    max_steps: 12
    scenario: "Model accuracy has silently dropped from 0.89 to 0.61 over 2 weeks due to shifting user behavior patterns."
    
  - id: gpu_nan_failure
    name: "Silent GPU NaN Failure Recovery"
    description: "Debug silent NaN GPU failure, recover from checkpoint, and restore model accuracy"
    difficulty: hard
    max_steps: 15
    scenario: "A faulty GPU driver causes NaN loss spikes during fine-tuning. Model silently produces garbage predictions."

action_space: 
  type: discrete
  size: 9
  actions:
    - check_feature_stats
    - view_training_logs
    - fix_schema
    - run_eval_set
    - rollback_model
    - analyze_drift
    - trigger_retraining
    - deploy_model
    - check_gpu_health
    - inspect_model_weights
    - restart_training_node
    - resume_from_checkpoint

observation_space: 
  type: structured
  fields:
    - task_id (str)
    - step (int)
    - pipeline_status (str)
    - model_accuracy (float)
    - baseline_accuracy (float)
    - available_actions (list)
    - logs (list)
    - feature_stats (dict)
    - error_messages (list)
    - hint (str)

reward_range: [0.0, 0.35]
episode_horizon: 15
success_criteria:
  - root_cause_identified == True
  - fix_applied == True
  - model_accuracy >= baseline_accuracy

api:
  server: FastAPI
  port: 7860
  endpoints:
    - POST /reset (task_id: str) → Observation
    - POST /step (action: MLOpsAction) → {observation, reward, done, info}
    - GET /state → MLOpsState
    - GET /health → HealthResponse
    - GET /tasks → List[TaskDescription]

runtime:
  language: Python 3.11
  framework: FastAPI
  asynchronous: false
  deterministic: true
  reproducible: true

baseline:
  model: Qwen/Qwen2.5-72B-Instruct
  routing: huggingface-router
  expected_performance:
    schema_drift: 0.75
    concept_drift: 0.65
    gpu_nan_failure: 0.55
    average: 0.65
