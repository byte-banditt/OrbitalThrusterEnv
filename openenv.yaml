spec_version: 1
name: orbital-thruster-env
version: "1.0.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  An OpenEnv mission-operations benchmark for long-horizon spacecraft control.
  Agents must follow multi-phase directives, preserve fuel for delayed
  objectives, recover from anomalies, and finish in precision hold.
author: OpenAI Codex
tags:
  - aerospace
  - physics
  - control
  - mission-ops
  - reinforcement-learning
  - long-horizon-planning
reward_range: [-1.0, 1.0]
action_space:
  - fire_pitch_pos_small
  - fire_pitch_neg_small
  - fire_roll_pos_small
  - fire_roll_neg_small
  - fire_yaw_pos_small
  - fire_yaw_neg_small
  - fire_pitch_pos_large
  - fire_pitch_neg_large
  - fire_roll_pos_large
  - fire_roll_neg_large
  - fire_yaw_pos_large
  - fire_yaw_neg_large
  - idle
observation_space:
  type: structured_json
  fields:
    - task_id
    - difficulty
    - mission_phase
    - current_attitude_deg
    - current_angular_velocity_dps
    - target_attitude_deg
    - attitude_error_deg
    - fuel_remaining
    - fuel_used
    - step_budget
    - steps_used
    - time_elapsed
    - disturbance_level
    - mission_brief
    - active_directive
    - pending_directives_count
    - milestones_completed
    - anomaly_flags
    - fuel_reserve_target
    - phase_deadline_step
    - last_action
    - reward_so_far
    - last_feedback
    - done
    - reward
    - success
    - reward_breakdown
    - episode_metrics
tasks:
  - id: detumble_satellite
    difficulty: easy
    description: Curriculum task. Stabilize a newly deployed spacecraft with mild residual spin and finish with a healthy fuel reserve.
    step_budget: 96
  - id: retarget_180_flip
    difficulty: medium
    description: Curriculum task. Respect a delayed retarget window, execute the 180-degree flip, and settle without overshoot.
    step_budget: 180
  - id: long_horizon_precision_hold
    difficulty: hard
    description: Curriculum task. Maintain precision pointing through a long disturbance-heavy segment while protecting the reserve.
    step_budget: 480
  - id: mission_ops_long_horizon
    difficulty: hard
    description: Flagship Theme #2 task. Chain detumble, coast discipline, retargeting, anomaly recovery, and precision hold in one delayed-reward mission.
    step_budget: 360
